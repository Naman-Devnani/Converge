<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!-- L-1: Removed user-scalable=no / maximum-scale=1.0 (WCAG 1.4.4 violation).
         The map container itself uses touch-action:pan-x pan-y via CSS to
         capture swipe without blocking browser pinch-to-zoom globally. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <meta name="description" content="Privacy-first mutual live location sharing for real-world meetups" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MeetSync" />
    <!-- Open Graph for link previews when sharing -->
    <meta property="og:title" content="MeetSync – Join my meetup" />
    <meta property="og:description" content="See each other on a live map. No app needed." />
    <meta property="og:type" content="website" />
    <title>MeetSync – Meet people, not complications</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
