<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!-- L-1: Removed user-scalable=no / maximum-scale=1.0 (WCAG 1.4.4 violation).
         The map container itself uses touch-action:pan-x pan-y via CSS to
         capture swipe without blocking browser pinch-to-zoom globally. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- QUAL-05: Best-effort Content-Security-Policy. unsafe-inline for scripts is required
         because Vite injects inline scripts in dev mode. Use nonces in production.
         connect-src includes http://localhost:* for socket.io polling transport in dev. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: http://localhost:* https://photon.komoot.io https://*.basemaps.cartocdn.com; img-src * data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:;">
    <meta name="theme-color" content="#10b981" />
    <meta name="description" content="Privacy-first mutual live location sharing for real-world meetups" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Converge" />
    <!-- Open Graph for link previews when sharing -->
    <meta property="og:title" content="Converge – Join my meetup" />
    <meta property="og:description" content="See each other on a live map. No app needed." />
    <meta property="og:type" content="website" />
    <title>Converge – Meet people, not complications</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
